## Base experiment config (updated to unified REINFORCE policy)
# This file serves as the base_config for sweep specs (e.g. reinforce_unified_sweepspec.yaml)
# Unified REINFORCE replaces legacy preset class names like REINFORCE_Baseline_Gaussian_v2_*

num_days: 1            # days per trajectory
num_trajs: 100         # trajectories per epoch
num_epochs: 100         # training epochs
setup: one_segment
seed: 123              # optional; remove for stochastic run
label: base_config     # optional, for easier filtering later
agents:
  - name: learner
    policy: REINFORCE
    params:
      learning_rate: 1e-5
      dist_type: gaussian # lognormal # triangular
      use_baseline: false
      shape_reward: false
      # Explicit architecture (matches a simple baseline-style net)
      actor_hidden_layers: 4
      actor_hidden_units: 4
      actor_final_activation: relu
      critic_hidden_layers: 4
      critic_hidden_units: 4
      # Optional explicit action-space initialization targets in natural units.
      init_action_center: 10.0
      init_action_stddev: 0.5
      min_action_stddev: 0.1  # natural action units; runner scales before policy construction
      # Optional advanced knob for the parameter-head kernel initializer.
      # Omit to use the framework default.
      param_kernel_initializer: glorot_uniform # zeros
  - name: baseline
    policy: FixedBidPolicy
    params:
      bid_per_item: 5
      total_limit: 5
